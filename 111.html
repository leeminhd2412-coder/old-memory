<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiên Thần Lynh - Ký Ức Mãi Đây</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Quicksand:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-font: 'Quicksand', sans-serif;
            --accent-font: 'Dancing Script', cursive;
            --text-color: #3a3a3a;
            --primary-color: #a4508b;
            --secondary-color: #5f0a87;
            --highlight-color: #ff9a8b;
            --bg-gradient-angelic: linear-gradient(to right, #ffecd2 0%, #fcb69f 100%);
            --current-bg: var(--bg-gradient-angelic);
        }

        body {
            font-family: var(--primary-font);
            background: var(--current-bg);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            overflow-x: hidden;
            transition: background 1s ease-in-out;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image:
                radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 130px 80px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 160px 120px, #ddd, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: twinkle 5s infinite linear;
            z-index: -1;
            opacity: 0.5;
        }

        @keyframes twinkle {
            0% { background-position: 0 0; }
            100% { background-position: -200px -200px; }
        }

        .container {
            background-color: rgba(255, 255, 255, 0.92);
            padding: 30px 35px;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2), 0 0 0 10px rgba(255,255,255,0.3);
            max-width: 700px;
            width: 95%;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            animation: fadeInScaleUp 1s ease-out forwards;
            position: relative; 
            overflow: hidden; 
            z-index: 1;
        }
        
        .angel-wings {
            position: absolute;
            font-size: 5em; 
            opacity: 0.1;
            color: var(--primary-color);
            user-select: none;
            pointer-events: none;
        }
        .angel-wings.left { top: 20px; left: -20px; transform: rotate(-15deg); }
        .angel-wings.right { top: 20px; right: -20px; transform: rotate(15deg) scaleX(-1); }

        @keyframes fadeInScaleUp {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        h1 {
            font-family: var(--accent-font);
            color: var(--primary-color);
            font-size: 3.5em; 
            margin-bottom: 5px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.1);
            animation: slideInDown 1s ease-out 0.2s forwards;
            opacity: 0;
        }

        .subtitle { 
            font-family: var(--primary-font);
            font-size: 1.2em;
            color: var(--secondary-color);
            margin-bottom: 20px;
            font-style: italic;
            font-weight: 400;
            animation: slideInUp 1s ease-out 0.4s forwards;
            opacity: 0;
            min-height: 20px; 
            transition: opacity 0.7s ease-in-out;
        }

        #mood-quote {
            font-family: var(--primary-font);
            font-size: 1.1em;
            color: var(--text-color);
            margin: 20px 0;
            min-height: 40px; 
            font-style: italic;
            opacity: 0;
            transition: opacity 0.7s ease-in-out;
            animation: fadeInText 1s ease-out 0.8s forwards;
        }

        #image-container {
            margin-bottom: 25px;
            min-height: 300px; 
            display: flex;
            align-items: center;
            justify-content: center;
            border: none; 
            padding: 10px;
            border-radius: 15px;
            background-color: rgba(255,255,255,0.6);
            position: relative;
            overflow: hidden; 
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        
        #image-container::before { 
            content: "";
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,223,186,0.5) 0%, rgba(255,223,186,0) 60%); 
            animation: rotateGlow 15s linear infinite;
            opacity: 0.7;
        }

        @keyframes rotateGlow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        #random-image {
            max-width: 100%;
            max-height: 400px; 
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            transition: opacity 0.8s ease-in-out, transform 0.8s ease-in-out, filter 0.8s ease-in-out;
            filter: sepia(10%) brightness(105%) contrast(95%) saturate(110%);
            transform: scale(1);
            z-index: 1; 
        }
        #random-image.loading { opacity: 0; transform: scale(0.95) rotate(-2deg); }
        #random-image.loaded { opacity: 1; transform: scale(1) rotate(0deg); }
        #random-image:hover {
            filter: sepia(0%) brightness(100%) contrast(100%) saturate(100%);
            transform: scale(1.03);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }

        audio {
            width: 100%;
            margin-top: 20px;
            margin-bottom: 10px;
            filter: hue-rotate(300deg) saturate(0.8) brightness(0.95);
            border-radius: 50px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        button {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white; border: none; padding: 15px 35px; font-size: 1.15em;
            font-weight: 500; font-family: var(--primary-font); border-radius: 50px;
            cursor: pointer; transition: all 0.35s ease;
            box-shadow: 0 8px 18px rgba(95, 10, 135, 0.35);
            text-transform: uppercase; letter-spacing: 1.5px; margin-top: 10px;
            animation: slideInUp 1s ease-out 0.6s forwards; opacity: 0;
        }
        button:hover {
            background: linear-gradient(135deg, var(--secondary-color) 0%, var(--primary-color) 100%);
            box-shadow: 0 10px 25px rgba(95, 10, 135, 0.5);
            transform: translateY(-4px) scale(1.02);
        }
        button:active {
            transform: translateY(-2px) scale(0.98);
            box-shadow: 0 5px 15px rgba(95, 10, 135, 0.3);
        }
        
        .music-notice {
            font-size: 0.85em; color: #777; margin-top: 5px; margin-bottom: 20px;
            font-style: italic; animation: fadeInText 1s ease-out 1s forwards; opacity: 0;
        }

        .footer-text {
            margin-top: 25px; font-size: 1em; color: var(--secondary-color);
            font-family: var(--accent-font); opacity: 0;
            animation: fadeInText 1s ease-out 1.2s forwards;
        }
        
        @keyframes slideInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInText { from { opacity: 0; } to { opacity: 1; } }

        .sparkle-effect {
            position: fixed; width: 6px; height: 6px;
            background-color: rgba(255, 215, 0, 0.6); border-radius: 50%;
            pointer-events: none; opacity: 0;
            animation: sparkle-anim 1.8s ease-out forwards; z-index: 2;
            box-shadow: 0 0 6px rgba(255, 215, 0, 0.4);
        }
        @keyframes sparkle-anim {
            0% { opacity: 0; transform: scale(0.2) rotate(0deg); }
            20% { opacity: 0.7; } 
            80% { opacity: 0.7; transform: scale(1) rotate(120deg); }
            100% { opacity: 0; transform: scale(0.2) rotate(240deg); }
        }

        .gentle-heart {
            position: fixed; font-size: 18px; color: rgba(255, 105, 180, 0.5);
            pointer-events: none; opacity: 0;
            animation: gentle-float 4.5s ease-out forwards; z-index: 2;
            text-shadow: 0 0 5px rgba(255, 105, 180, 0.2);
        }
        @keyframes gentle-float {
            0% { opacity: 0; transform: translateY(30px) scale(0.4) rotate(-10deg); }
            20% { opacity: 0.6; transform: translateY(-40px) scale(0.7) rotate(5deg); }
            80% { opacity: 0.3; transform: translateY(-180px) scale(1) rotate(-5deg); }
            100% { opacity: 0; transform: translateY(-280px) scale(1.3) rotate(10deg); }
        }

        .message-section {
            margin-top: 35px; padding: 25px;
            background-color: rgba(255, 255, 255, 0.6); border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.12);
            animation: fadeInScaleUp 1s ease-out 1s forwards; opacity: 0;
        }
        .message-title {
            font-family: var(--accent-font); color: var(--primary-color);
            font-size: 2.2em; margin-bottom: 18px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.05);
        }
        #message-to-lynh {
            width: calc(100% - 24px); min-height: 90px; padding: 12px;
            border-radius: 10px; border: 1px solid #ced4da;
            font-family: var(--primary-font); font-size: 1.05em; margin-bottom: 18px;
            resize: vertical; box-shadow: inset 0 2px 4px rgba(0,0,0,0.06);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        #message-to-lynh:focus {
            outline: none; border-color: var(--primary-color);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.06), 0 0 10px rgba(164, 80, 139, 0.35);
        }
        .send-message-button {
            background: linear-gradient(135deg, var(--highlight-color) 0%, var(--primary-color) 100%) !important;
            color: white !important; border: none !important; padding: 14px 30px !important;
            font-size: 1.1em !important; font-weight: 500 !important;
            font-family: var(--primary-font) !important; border-radius: 50px !important;
            cursor: pointer !important; transition: all 0.35s ease !important;
            box-shadow: 0 7px 15px rgba(255, 154, 139, 0.3) !important;
            text-transform: uppercase !important; letter-spacing: 1.2px !important;
            margin-top: 0px; margin-bottom: 25px;
            animation: none !important; opacity: 1 !important;
        }
        .send-message-button:hover {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--highlight-color) 100%) !important;
            box-shadow: 0 9px 22px rgba(164, 80, 139, 0.4) !important;
            transform: translateY(-3px) scale(1.02) !important;
        }
        .send-message-button:active {
            transform: translateY(-1px) scale(0.99) !important;
            box-shadow: 0 5px 12px rgba(164, 80, 139, 0.3) !important;
        }
        #sent-messages-display { margin-top: 25px; text-align: left; }
        #sent-messages-display h3 {
            font-family: var(--primary-font); color: var(--secondary-color);
            font-size: 1.25em; margin-bottom: 12px;
            border-bottom: 1px dashed var(--highlight-color); padding-bottom: 8px;
        }
        #message-list {
            list-style-type: none; padding-left: 0; max-height: 200px;
            overflow-y: auto; scrollbar-width: thin;
            scrollbar-color: var(--highlight-color) rgba(255,255,255,0.3);
        }
        #message-list::-webkit-scrollbar { width: 8px; }
        #message-list::-webkit-scrollbar-track { background: rgba(255,255,255,0.3); border-radius: 10px; }
        #message-list::-webkit-scrollbar-thumb {
            background-color: var(--highlight-color); border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.3);
        }
        #message-list li {
            background-color: rgba(255, 255, 255, 0.75);
            padding: 10px 15px; border-radius: 8px; margin-bottom: 10px;
            border-left: 4px solid var(--primary-color);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex; /* Flexbox cho layout li */
            justify-content: space-between;
            align-items: flex-start; /* Căn các item con lên trên */
        }
        #message-list li:hover { transform: translateX(5px); box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
        
        #message-list li .msg-content { /* Container cho text và timestamp */
             flex-grow: 1; /* Cho phép phần này co giãn */
        }
        #message-list li .msg-text {
            display: block; margin-bottom: 5px; white-space: pre-wrap;
            word-break: break-word; color: var(--text-color);
            font-size: 1em; line-height: 1.5;
        }
        #message-list li .msg-timestamp {
            display: block; font-size: 0.75em; color: #888;
            text-align: right; font-style: italic;
        }
        .delete-message-button { /* Style cho nút xóa */
            background-color: #ff7979; color: white; border: none;
            padding: 5px 10px; font-size: 0.85em; border-radius: 5px;
            cursor: pointer; margin-left: 10px; transition: background-color 0.2s ease;
            flex-shrink: 0; /* Không cho nút co lại */
            align-self: center; /* Căn nút xóa vào giữa theo chiều dọc của li */
        }
        .delete-message-button:hover { background-color: #ff4757; }

        .temp-feedback {
            text-align: center; font-style: italic; color: var(--primary-color);
            font-size: 0.95em; margin-bottom: 15px; opacity: 0;
            transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out, height 0.5s ease-in-out;
            transform: translateY(10px); height: 0; overflow: hidden;
        }
        .temp-feedback.visible {
            opacity: 1; transform: translateY(0); height: auto; margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="stars"></div>

    <div class="container">
        <div class="angel-wings left">🕊️</div>
        <div class="angel-wings right">🕊️</div>

        <h1><span style="color: var(--highlight-color);">L</span>ynh <span style="color: var(--highlight-color);">A</span>ngel</h1>
        <p class="subtitle"></p> 
        <p id="mood-quote"></p>
        <div id="image-container">
            <img id="random-image" src="" alt="Kỷ niệm cùng Lynh Angel" class="loading">
        </div>
        <button onclick="displayNewContent()">Ngắm Lại Thiên Thần</button>
        <audio id="bg-music" controls autoplay loop>
            <source src="pcedy.mp3" type="audio/mpeg"> <!-- THAY TÊN FILE NHẠC CỦA BẠN Ở ĐÂY -->
            Trình duyệt của bạn không hỗ trợ phát âm thanh.
        </audio>
        <p id="music-message" class="music-notice"><i>(Nhạc đang cố gắng tự phát... Nếu không, hãy nhấn Play nhé!)</i></p>
        
        <div class="message-section">
            <h2 class="message-title">Đôi Dòng Gửi Lynh</h2>
            <textarea id="message-to-lynh" placeholder="Viết lời yêu thương gửi đến Lynh ở phương xa..."></textarea>
            <button class="send-message-button" onclick="sendMessageToLynh()">Gửi Đi Với Gió</button>
            <div id="sent-messages-display">
                <h3>Những lời đã gửi bay theo gió:</h3>
                <ul id="message-list"></ul>
                <p id="no-messages-yet" style="display: none; font-style: italic; color: #777;">Chưa có lời nhắn nào được gửi đi...</p>
            </div>
        </div>

        <p class="footer-text">"Dù chỉ là hoài niệm, vẫn đẹp tựa một bài thơ..."</p>
    </div>

    <script>
        const totalImages = 60; // THAY SỐ LƯỢNG ẢNH CỦA BẠN
        const imagePrefix = "am ("; // THAY TIỀN TỐ FILE ẢNH (VD: "images/am (" nếu trong thư mục con)
        const imageSuffix = ").jpg";
        
        const imageElement = document.getElementById('random-image');
        const moodElement = document.getElementById('mood-quote');
        const subtitleElement = document.querySelector('.subtitle');
        const musicElement = document.getElementById('bg-music');
        const musicMessageElement = document.getElementById('music-message');

        const moodQuotes = [
            "Em gửi nụ hôn theo gió, mong anh cảm nhận được.", "Hãy sống thật rực rỡ, để khi gặp lại, em nhận ra anh ngay.",
            "Anh à, tình yêu này sẽ không bao giờ là quá khứ. Em yêu anh!", "Em vẫn ở đây, chỉ là… không còn đau nữa thôi.",
            "Có những đêm em nhìn thấy anh ngồi im lặng – em chỉ ước mình có thể siết tay anh thật chặt.",

            "Anh là lý do khiến em cố gắng sống thêm một ngày nữa.", "Đôi mắt anh từng là nơi em trốn cả thế giới… giờ hãy để mắt em trên trời dõi theo anh.",

            "Anh nhớ lần em ngất ở hành lang bệnh viện không? Em sợ lắm, nhưng lúc đó nghe tiếng anh gọi, tự nhiên thấy an tâm hẳn.",

            "Lạnh lùng là phong cách, còn nhớ anh là bản năng :)", "Em hay bảo anh ngốc, nhưng thật ra… người ngốc là em, vì lỡ yêu anh nhiều quá :<",

            "Lúc em lặng im nhất… là lúc em nhớ anh nhất đó. Nhưng không dám làm phiền anh thôi.", "Em từng tưởng mình là gánh nặng… nhưng anh đã khiến em cảm thấy mình đáng được yêu.",

            "Giá như có lần nữa được tựa vai anh khi mệt, em hứa sẽ không giả vờ mạnh mẽ nữa :<", "Nếu có ai hỏi em từng là ai… em sẽ nói em là đứa phiền phức nhất từng yêu anh :)",
            "Thế giới này có thể quên em, nhưng anh thì đừng. Em sẽ ghen đấy đó 😒", "Nếu thấy bầu trời trong lành bất ngờ, có khi là em đang cười với anh đó =)))",
            "Em vẫn là em – linh tinh, rối bời, yếu xìu… nhưng trong lòng thì chỉ có anh.", "Có lúc em nhắn 'Em ổn'… là lúc em cần anh nhất.",
            "Tình yêu của em… không phải là hoàn hảo, nhưng là duy nhất – dành trọn cho anh.", "Anh là phần bình yên duy nhất trong thế giới hỗn loạn của em.",
            "Ở đây không có wifi đâu, nên em không thể nhắn tin cho anh được nữa, nhưng trái tim thì vẫn bắt sóng anh đều đều :)",
            "Đừng bao giờ nghĩ em biến mất nhé… em chỉ đang trốn trong ký ức đẹp nhất của anh thôi :)"

        const angelicDescriptions = [
            "Trong khu vườn ký ức, em là đoá hồng không phai...", "Mỗi vì sao trên trời, là một lời thì thầm em gửi đến anh.",
            "Dù xa cách, trái tim em vẫn luôn hướng về anh.", "Những kỷ niệm của chúng ta, em giữ gìn như báu vật.",
            "Nơi thiên đường này, em vẫn dõi theo và mỉm cười cùng anh."
        ];

        let availableImageIndices = [];
        let availableMoodQuoteIndices = [];
        let availableSubtitleIndices = [];

        function initializeAvailableIndices(array, totalCount, startFromOne = false) {
            array.length = 0; 
            for (let i = 0; i < totalCount; i++) array.push(startFromOne ? i + 1 : i);
        }

        function getRandomItemIndex(availableIndicesArray, totalItems, startFromOne = false) {
            if (availableIndicesArray.length === 0) initializeAvailableIndices(availableIndicesArray, totalItems, startFromOne);
            const randomIndexInAvailable = Math.floor(Math.random() * availableIndicesArray.length);
            return availableIndicesArray.splice(randomIndexInAvailable, 1)[0];
        }

        function displayImage() {
            if (totalImages === 0) {
                imageElement.alt = "Không có hình ảnh để hiển thị."; imageElement.src = "";
                imageElement.classList.remove('loading', 'loaded'); return;
            }
            const imageNumber = getRandomItemIndex(availableImageIndices, totalImages, true);
            const imageName = imagePrefix + imageNumber + imageSuffix;
            imageElement.classList.remove('loaded'); imageElement.classList.add('loading');
            const tempImage = new Image();
            tempImage.onload = () => {
                setTimeout(() => {
                    imageElement.src = imageName;
                    imageElement.alt = "Kỷ niệm Lynh Angel - Ảnh " + imageNumber;
                    imageElement.classList.remove('loading'); imageElement.classList.add('loaded');
                }, 200); 
            };
            tempImage.onerror = () => {
                console.error("Lỗi tải ảnh:", imageName);
                imageElement.alt = "Lỗi tải ảnh: " + imageName; imageElement.src = ""; 
                imageElement.classList.remove('loading', 'loaded');
            }
            tempImage.src = imageName;
        }

        function displayMoodQuote() {
            const quoteIndex = getRandomItemIndex(availableMoodQuoteIndices, moodQuotes.length);
            moodElement.style.opacity = 0;
            setTimeout(() => { moodElement.textContent = `"${moodQuotes[quoteIndex]}"`; moodElement.style.opacity = 1; }, 400);
        }

        function displaySubtitle() {
            const subtitleIndex = getRandomItemIndex(availableSubtitleIndices, angelicDescriptions.length);
            subtitleElement.style.opacity = 0;
            setTimeout(() => { subtitleElement.textContent = `"${angelicDescriptions[subtitleIndex]}"`; subtitleElement.style.opacity = 1; }, 450); 
        }
        
        function displayNewContent(){ displayImage(); displayMoodQuote(); displaySubtitle(); }
        
        let sparkleInterval, heartInterval;
        function createGentleSparkle() { /* ... (giữ nguyên hàm này) ... */ }
        function createGentleHeart() { /* ... (giữ nguyên hàm này) ... */ }
         // (Code cho createGentleSparkle và createGentleHeart giữ nguyên như trước)
         function createGentleSparkle() {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle-effect';
            sparkle.style.left = Math.random() * window.innerWidth + 'px';
            sparkle.style.top = Math.random() * window.innerHeight + 'px';
            const colors = ['rgba(255,215,0,0.6)', 'rgba(255,250,205,0.6)', 'rgba(240,230,140,0.5)'];
            sparkle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            const size = Math.random() * 3 + 4; 
            sparkle.style.width = size + 'px';
            sparkle.style.height = size + 'px';
            document.body.appendChild(sparkle);
            setTimeout(() => { sparkle.remove(); }, 1800);
        }

        function createGentleHeart() {
            const heart = document.createElement('div');
            heart.className = 'gentle-heart';
            const heartChars = ['💖', '💕', '💗', '🌸', '✨']; 
            heart.textContent = heartChars[Math.floor(Math.random() * heartChars.length)];
            heart.style.left = (Math.random() * 90 + 5) + '%'; 
            heart.style.top = (Math.random() * 20 + 85) + '%'; 
            heart.style.fontSize = (Math.random() * 8 + 14) + 'px'; 
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 4500);
        }

        const messageInput = document.getElementById('message-to-lynh');
        const messageList = document.getElementById('message-list');
        const noMessagesYetElement = document.getElementById('no-messages-yet');
        const messageSection = document.querySelector('.message-section');
        const LOCAL_STORAGE_MESSAGES_KEY = 'messagesForLynhAngel_v3'; // Đổi key nếu cấu trúc message thay đổi

        function sendMessageToLynh() {
            const messageText = messageInput.value.trim();
            if (messageText === "") {
                messageInput.placeholder = "Hãy viết điều gì đó yêu thương nhé..."; messageInput.focus(); return;
            }
            let messages = JSON.parse(localStorage.getItem(LOCAL_STORAGE_MESSAGES_KEY)) || [];
            const newMessage = {
                id: Date.now(), // ID duy nhất cho mỗi tin nhắn
                text: messageText,
                timestamp: new Date().toLocaleString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' })
            };
            messages.push(newMessage);
            if (messages.length > 50) messages = messages.slice(messages.length - 50);
            localStorage.setItem(LOCAL_STORAGE_MESSAGES_KEY, JSON.stringify(messages));
            messageInput.value = ""; messageInput.placeholder = "Viết lời yêu thương gửi đến Lynh ở phương xa...";
            
            let feedbackElement = messageSection.querySelector('.temp-feedback');
            if (!feedbackElement) {
                feedbackElement = document.createElement('p'); feedbackElement.className = 'temp-feedback';
                const sendButton = messageSection.querySelector('.send-message-button');
                messageSection.insertBefore(feedbackElement, sendButton);
            }
            feedbackElement.textContent = "Lời nhắn của bạn đã nhẹ nhàng bay theo gió...";
            feedbackElement.classList.add('visible');
            setTimeout(() => { feedbackElement.classList.remove('visible'); }, 3500);
            loadMessages();
        }

        function loadMessages() {
            messageList.innerHTML = ""; 
            const messages = JSON.parse(localStorage.getItem(LOCAL_STORAGE_MESSAGES_KEY)) || [];
            if (messages.length === 0) {
                if(noMessagesYetElement) noMessagesYetElement.style.display = 'block';
            } else {
                if(noMessagesYetElement) noMessagesYetElement.style.display = 'none';
                messages.slice().reverse().forEach(msgData => {
                    const listItem = document.createElement('li');
                    
                    const contentDiv = document.createElement('div'); // Bọc text và timestamp
                    contentDiv.className = 'msg-content';

                    const textSpan = document.createElement('span');
                    textSpan.className = 'msg-text'; textSpan.textContent = msgData.text;
                    
                    const timeSpan = document.createElement('span');
                    timeSpan.className = 'msg-timestamp'; timeSpan.textContent = `- ${msgData.timestamp}`;
                    
                    contentDiv.appendChild(textSpan); contentDiv.appendChild(timeSpan);
                    
                    const deleteButton = document.createElement('button'); // Nút xóa
                    deleteButton.className = 'delete-message-button'; deleteButton.textContent = 'Xóa';
                    deleteButton.title = "Xóa lời nhắn này";
                    deleteButton.onclick = function() { confirmDeleteMessage(msgData.id); };
                    
                    listItem.appendChild(contentDiv); // Thêm nội dung vào li
                    listItem.appendChild(deleteButton); // Thêm nút xóa vào li
                    messageList.appendChild(listItem);
                });
            }
        }

        function confirmDeleteMessage(messageId) { // Hàm xác nhận xóa
            if (confirm("Bạn có chắc chắn muốn xóa lời nhắn này không?")) {
                deleteMessage(messageId);
            }
        }

        function deleteMessage(messageId) { // Hàm xóa tin nhắn
            let messages = JSON.parse(localStorage.getItem(LOCAL_STORAGE_MESSAGES_KEY)) || [];
            messages = messages.filter(msg => msg.id !== messageId); // Lọc ra tin nhắn cần xóa
            localStorage.setItem(LOCAL_STORAGE_MESSAGES_KEY, JSON.stringify(messages));
            loadMessages(); // Tải lại danh sách
        }

        window.onload = function() {
            initializeAvailableIndices(availableImageIndices, totalImages, true);
            initializeAvailableIndices(availableMoodQuoteIndices, moodQuotes.length);
            initializeAvailableIndices(availableSubtitleIndices, angelicDescriptions.length);
            displayNewContent(); 
            const playPromise = musicElement.play();
            if (playPromise !== undefined) {
                playPromise.then(_ => { musicMessageElement.textContent = "♪ Âm nhạc đang ngân nga những giai điệu kỷ niệm... ♪"; })
                .catch(error => {
                    console.warn("Autoplay nhạc bị chặn:", error);
                    musicMessageElement.innerHTML = "<i>(Tự động phát nhạc không thành công. Hãy nhấn Play!)</i>";
                });
            }
            const mainButton = document.querySelector('button:not(.send-message-button)'); 
            if (mainButton) mainButton.onclick = displayNewContent;
            
            if (typeof sparkleInterval !== 'undefined') clearInterval(sparkleInterval);
            if (typeof heartInterval !== 'undefined') clearInterval(heartInterval);
            sparkleInterval = setInterval(createGentleSparkle, 800); 
            heartInterval = setInterval(createGentleHeart, 1600); 
            loadMessages();
        };
    </script>
